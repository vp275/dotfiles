# Set PATH for tmux (needed for plugins)
set-environment -g PATH "/opt/homebrew/bin:/opt/local/bin:/usr/local/bin:/usr/bin:/bin"

# Tmux clipboard integration (works in X with xclip installed).
set -g mouse on
set -g set-clipboard on
setw -g mode-keys vi

# Use Ctrl+a as the prefix.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mac-style bindings (requires terminal to send Command as Meta).
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n M-D split-window -v -c "#{pane_current_path}"
bind -n M-t new-window
bind -n M-w kill-pane
bind -n M-W kill-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-[ previous-window
bind -n M-] next-window
bind -n C-Tab next-window
bind -n C-S-Tab previous-window
# Ghostty remaps Ctrl+Tab to Ctrl+Right/Left.
bind -n C-Right next-window
bind -n C-Left previous-window
bind -n M-R source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded ~/.config/tmux/tmux.conf"
bind -n M-f copy-mode \; command-prompt -i -p "search" "send-keys -X search-forward-incremental '%%'"
bind -n M-e display-popup -E "~/.local/bin/tmux-flat-picker"
bind -n M-E display-popup -E "~/.local/bin/tmux-session-picker"
bind -n M-s choose-session
bind -n M-n command-prompt -p "New session name:" "new-session -s '%%'"
bind -n M-o run-shell ~/.config/tmux/plugins/tmux-sessionx/scripts/sessionx.sh
# tmux-resurrect: save/restore sessions
bind -n M-S run-shell ~/.config/tmux/plugins/tmux-resurrect/scripts/save.sh
bind -n M-T run-shell ~/.config/tmux/plugins/tmux-resurrect/scripts/restore.sh
bind -n M-z resize-pane -Z
bind -n M-a copy-mode
bind -n 'C-`' display-popup -E -w 24 -h 7 "~/.local/bin/tmux-session-cycler"
bind -n M-x switch-client -l
bind -n 'M-`' select-pane -t :.+
bind -n 'M-~' select-pane -t :.-

# Auto-name windows based on current directory.
set -g automatic-rename on
setw -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'

# Track window focus for MRU sorting in flat picker.
set-hook -g window-linked "run-shell '~/.local/bin/tmux-record-focus #{session_name}:#{window_index}'"
set-hook -g session-window-changed "run-shell '~/.local/bin/tmux-record-focus #{session_name}:#{window_index}'"
set-hook -g client-session-changed "run-shell '~/.local/bin/tmux-record-focus #{session_name}:#{window_index}'"

# Start window and pane numbering at 1.
set -g base-index 1
setw -g pane-base-index 1

# Thicker pane borders for better visibility.
set -g pane-border-lines double

# Copy selection to system clipboard - platform specific
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"
if-shell "uname | grep -q Darwin" \
    "bind -T copy-mode y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
    "bind -T copy-mode y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'"

# Custom status bar (Mercedes Petronas theme).
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#0A0A0A,fg=#f2f4f8"
set -g status-left-style "bg=#0A0A0A,fg=#00D2BE,bold"
set -g status-right-style "bg=#0A0A0A,fg=#f2f4f8"
set -g status-left-length 40
set -g status-right-length 120
set -g status-left "#[fg=#00D2BE,bg=#0A0A0A,bold] #{session_name} #[fg=#444444]|"
set -g status-right "#[fg=#f2f4f8]📈 SPX #(~/.local/bin/sp500-ticker) #[fg=#444444]| #[fg=#f2f4f8]🗽 NY #(TZ=America/New_York date +%%H:%%M) #[fg=#444444]| #[fg=#f2f4f8]%Y-%m-%d #[fg=#00D2BE,bold]%H:%M "
setw -g window-status-style "fg=#666666,bg=#0A0A0A"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=#161616,bg=#00D2BE,bold"
setw -g window-status-current-format " #I:#W#{?window_zoomed_flag, 🔴,} "
setw -g window-status-separator " "

# TPM (tmux plugin manager)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'

# tmux-continuum: auto-save every 15 mins, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.config/tmux/plugins/tpm/tpm'
